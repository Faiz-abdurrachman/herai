<main class="announcement-page">
    <div class="container">
        <div class="announcement-container">
            
            <div class="coming-soon-badge" id="badgeStatus">
                <i class="fas fa-award"></i> PORTAL PENGUMUMAN
            </div>

            <div id="formSection">
                <div class="announcement-header">
                    <h1>Pengumuman Hasil Seleksi <span>HerAI Fellowship 2026</span></h1>
                    <p>Silakan masukkan NIK dan Email Anda untuk mengecek status kelulusan pada tahap seleksi.</p>
                </div>

                <div class="announcement-card">
                    <div class="card-top-bar"></div>
                    <div class="card-body">
                        <form id="announcementForm">
                            <div class="form-group">
                                <label for="nik"><i class="fas fa-id-card"></i> Nomor Induk Kependudukan (NIK)</label>
                                <input type="text" id="nik" maxlength="16" placeholder="Masukkan 16 digit NIK" required>
                                <small>Masukkan NIK sesuai dengan berkas pendaftaran.</small>
                            </div>

                            <div class="form-group">
                                <label for="email"><i class="fas fa-envelope"></i> Alamat Email</label>
                                <input type="email" id="email" placeholder="contoh@email.com" required>
                            </div>

                            <button type="button" class="btn-check" id="btnCheck">
                                <i class="fas fa-search"></i> Lihat Hasil Seleksi
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="loadingSection" style="display: none; text-align: center; padding: 60px 0;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 3rem; color: #FF1493;"></i>
                <h3 style="margin-top: 20px; color: #1a0b2e; font-weight: 700;">MEMPROSES PROTOKOL KELULUSAN...</h3>
                <p style="color: #6b7a90;">Sistem sedang menvalidasi Digital ID Anda.</p>
            </div>

            <div id="resultSection" class="result-card-container">
                
                <div id="certificate-preview-container" class="qr-emerge" style="margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-radius: 20px; overflow: hidden; line-height: 0;">
                    </div>

                <div id="hidden-qr-builder" class="hidden" style="display: none;"></div>

                <div class="action-buttons" id="downloadActions">
                    <a href="" id="btnDownloadPng" class="btn-check" style="background: #1a0b2e; flex: 1; text-decoration: none;" download="Kartu_Pengumuman_HerAI.png">
                        <i class="fas fa-image"></i> Unduh PNG (HD)
                    </a>
                </div>
                
                <div style="text-align: center; margin-top: 15px;">
                    <button type="button" id="btnKembaliCek" style="background: none; border: none; color: #6b7a90; text-decoration: underline; cursor: pointer; font-family: 'Space Grotesk', sans-serif;">
                        Cek Peserta Lain
                    </button>
                </div>
            </div>

        </div>
    </div>
</main>
